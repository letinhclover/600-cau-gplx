<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ôn Thi GPLX 600 Câu 2026</title>

<meta name="description" content="Ôn thi GPLX 600 câu hỏi mới nhất 2026. Thi thử bằng lái xe B1 B2 C chuẩn Bộ GTVT.">

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

header{
background:#1e88e5;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.question{
font-size:18px;
margin-bottom:20px;
}

.answer{
display:block;
padding:12px;
margin:8px 0;
border:1px solid #ddd;
border-radius:6px;
cursor:pointer;
}

.answer:hover{
background:#f0f0f0;
}

.correct{
background:#c8e6c9;
}

.wrong{
background:#ffcdd2;
}

button{
margin-top:20px;
padding:12px 20px;
border:none;
background:#1e88e5;
color:white;
border-radius:6px;
cursor:pointer;
}

.score{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<header>
Ôn Thi GPLX 600 Câu
</header>

<div class="container">

<div class="card">

<div id="question" class="question"></div>

<div id="answers"></div>

<button onclick="nextQuestion()">Câu tiếp theo</button>

<div class="score" id="score"></div>

</div>

</div>

<script>

const questions = [

{
q:"Người lái xe phải làm gì khi gặp đèn đỏ?",
a:["Dừng lại","Đi tiếp","Tăng tốc","Bấm còi"],
correct:0
},

{
q:"Khi tham gia giao thông phải mang theo giấy tờ gì?",
a:["Giấy phép lái xe","Sổ hộ khẩu","Thẻ sinh viên","Không cần"],
correct:0
},

{
q:"Tốc độ tối đa trong khu dân cư là bao nhiêu?",
a:["50 km/h","80 km/h","100 km/h","120 km/h"],
correct:0
}

];

let current=0
let score=0

function loadQuestion(){

let q=questions[current]

document.getElementById("question").innerText=
"Câu "+(current+1)+": "+q.q

let answersHTML=""

q.a.forEach((ans,index)=>{

answersHTML+=`
<div class="answer" onclick="checkAnswer(${index})">
${ans}
</div>
`

})

document.getElementById("answers").innerHTML=answersHTML

}

function checkAnswer(index){

let q=questions[current]

let answers=document.querySelectorAll(".answer")

if(index==q.correct){

answers[index].classList.add("correct")
score++

}else{

answers[index].classList.add("wrong")
answers[q.correct].classList.add("correct")

}

document.getElementById("score").innerText=
"Điểm: "+score

}

function nextQuestion(){

current++

if(current>=questions.length){

alert("Hoàn thành bài thi! Điểm: "+score)

current=0
score=0

}

loadQuestion()

}

loadQuestion()

</script>

</body>
</html>
